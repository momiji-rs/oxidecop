# Publish to crates.io on version tags, authenticated via OIDC Trusted
# Publishing — no long-lived token in secrets. crates.io must list this
# repo + workflow file as a Trusted Publisher in the crate's settings
# (https://crates.io/crates/oxidecop/settings/new-trusted-publisher).
name: publish
on:
  push:
    tags: ['v*']
  # manual run = verify-only: exchange the OIDC token (proving the
  # crates.io Trusted Publisher config is right) without publishing
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token exchange with crates.io
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Gate — tag matches Cargo.toml, version not already published
        id: gate
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "verify-only run: will exchange the OIDC token, not publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ver=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag=${GITHUB_REF_NAME#v}
          if [ "$ver" != "$tag" ]; then
            echo "tag v$tag does not match Cargo.toml version $ver" >&2
            exit 1
          fi
          if curl -sf -A "oxidecop-publish (github.com/momiji-rs/oxidecop)" \
               "https://crates.io/api/v1/crates/oxidecop/$ver" > /dev/null; then
            echo "version $ver already on crates.io — nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        if: steps.gate.outputs.skip != 'true'
        run: cargo test --release

      # runs on verify-only too: a successful exchange IS the proof that the
      # crates.io Trusted Publisher entry (repo + workflow) is correct
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        if: steps.gate.outputs.skip != 'true'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Trusted Publishing verified
        if: steps.gate.outputs.skip == 'true'
        run: echo "OIDC exchange with crates.io succeeded — Trusted Publishing is configured correctly."
